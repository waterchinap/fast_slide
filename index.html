<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="node_modules/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="node_modules/reveal.js/dist/theme/black.css">
</head>

<body>
  <div class="reveal">
    <div class="slides" id="slides-container">
      <section>正在获取最新估值数据...</section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/ejs@3.1.9/ejs.min.js"></script>

  <script id="ejs-template" type="text/template">
    <% idxEvalList.forEach(function(item) { %>
      <section>
        <% 
          const colorMap = { 'LOW': '#00ff00', 'MID': '#ffff00', 'HIGH': '#ff5555' };
          const titleColor = colorMap[item.group] || '#ffffff';
          const excludeFields = ['indexName', 'indexCode', 'group', 'category', 'allFund', 'fundCodes', 'allFundCodes', 'date', 'scoreBy', 'source', 'fund'];
        %>
      
        <h2 style="color: <%= titleColor %>;">
          <%= item.indexName %> (<%= item.indexCode %>)
        </h2>

        <div class="metrics-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.7em; text-align: left;">
          <% for (let key in item) { %>
            <% if (!excludeFields.includes(key)) { %>
              <div style="border-bottom: 1px solid #444; padding: 4px;">
                <span style="color: #999;"><%= key %>:</span>
                <strong style="float: right;">
                  <%= (typeof item[key] === 'number' && item[key] < 1) ? (item[key] * 100).toFixed(2) + '%' : item[key] %>
                </strong>
              </div>
            <% } %>
          <% } %>
        </div>
      </section>
    <% }); %>
  </script>

  <script src="node_modules/reveal.js/dist/reveal.js"></script>
  <script>
    async function initSlides() {
      try {
        // 1. 获取 FastAPI 后端数据
        const response = await fetch('http://127.0.0.1:8000/api/slides');
        const data = await response.json();

        // 假设数据在 data.idxEvalList 中
        const templateStr = document.getElementById('ejs-template').innerHTML;
        const html = ejs.render(templateStr, data)
        const container = document.getElementById('slides-container');
        document.getElementById('slides-container').innerHTML = html


        // 3. 【关键】数据填充完后再初始化
        Reveal.initialize({
          hash: true,
          controls: true,
          progress: true,
          center: true
        });

      } catch (err) {
        console.error("数据加载失败:", err);
      }
    }

    initSlides();
  </script>
</body>

</html>
